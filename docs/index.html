<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Snap</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #3c3cb4, #8232a0);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .container {
            text-align: center;
            padding: 40px 24px;
        }
        h1 { font-size: 42px; margin-bottom: 12px; }
        .tagline { font-size: 20px; opacity: 0.85; margin-bottom: 40px; }
        .links a {
            display: inline-block;
            color: #fff;
            text-decoration: none;
            padding: 12px 28px;
            border: 2px solid rgba(255,255,255,0.4);
            border-radius: 8px;
            margin: 8px;
            transition: background 0.2s;
        }
        .links a:hover { background: rgba(255,255,255,0.15); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Study Snap</h1>
        <p class="tagline">Snap. Learn. Remember.</p>
        <div class="links">
            <a href="privacy-policy.html">Privacy Policy</a>
        </div>
    </div>
</body>
</html>
